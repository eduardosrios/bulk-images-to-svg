name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable Pages site
        if: ${{ secrets.PAGES_TOKEN != '' }}
        env:
          PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          status="$(curl -L -sS -o /tmp/pages-site.json -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${PAGES_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/pages")"

          if [ "$status" = "200" ]; then
            echo "GitHub Pages is already enabled."
            exit 0
          fi

          if [ "$status" != "404" ]; then
            cat /tmp/pages-site.json
            echo "Unexpected GitHub Pages status: ${status}"
            exit 1
          fi

          curl -L -sS -f \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${PAGES_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/pages" \
            -d '{"build_type":"workflow"}'

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          token: ${{ secrets.PAGES_TOKEN || github.token }}
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
