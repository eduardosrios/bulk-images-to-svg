name: Auto Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release for commit
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          short_sha="${SHA::7}"
          tag="release-${short_sha}"
          title="Release ${short_sha}"
          subject="$(git log -1 --pretty=%s)"

          if ! git rev-parse "$tag" >/dev/null 2>&1; then
            git tag "$tag" "$SHA"
            git push origin "$tag"
          fi

          if gh release view "$tag" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $tag already exists."
            exit 0
          fi

          gh release create "$tag" \
            --repo "$REPO" \
            --target "$SHA" \
            --title "$title" \
            --notes "Automatic release for commit ${short_sha}: ${subject}"
