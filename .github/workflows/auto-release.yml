name: Auto Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release for commit
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          short_sha="${SHA::7}"
          version="1.0.${RUN_NUMBER}"
          tag="v${version}"
          title="${version}"
          subject="$(git log -1 --pretty=%s)"
          date="$(date -u +"%Y-%m-%d")"

          cat > release-notes.md <<EOF
          Public release for Bulk Images to SVG.

          Commit: ${short_sha}
          Date: ${date}
          Change: ${subject}

          Highlights:

          - Bulk image uploader for PNG, JPG, JPEG, GIF, WebP, and AVIF.
          - Client-side image to SVG conversion with Trace and Exact conversion paths.
          - Optimized SVG output with path simplification and compact number precision.
          - Individual SVG download, copy SVG, and Download All SVGs as ZIP.
          - Interactive palette swatches for customizing generated SVG colors.
          - Synchronized Original and SVG Output previews with shared zoom.
          - Responsive black and white editor UI ready for GitHub Pages.
          EOF

          if ! git rev-parse "$tag" >/dev/null 2>&1; then
            git tag "$tag" "$SHA"
            git push origin "$tag"
          fi

          if gh release view "$tag" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $tag already exists."
            exit 0
          fi

          gh release create "$tag" \
            --repo "$REPO" \
            --target "$SHA" \
            --title "$title" \
            --notes-file release-notes.md
