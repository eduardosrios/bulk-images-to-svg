<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PNG to SVG Converter</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <h1>PNG to SVG Converter</h1>
            <p>Pure JS vector export</p>
          </div>
        </div>
        <div class="top-actions">
          <button class="button secondary" id="sampleButton" type="button">Sample</button>
          <button class="button primary" id="downloadButton" type="button" disabled>Download SVG</button>
        </div>
      </header>

      <main class="workspace">
        <aside class="control-panel" aria-label="Converter controls">
          <label class="drop-zone" id="dropZone">
            <input id="fileInput" type="file" accept="image/png,image/*">
            <span class="drop-title">PNG input</span>
            <span class="drop-name" id="fileName">Drop or browse</span>
          </label>

          <section class="control-group" aria-labelledby="modeLabel">
            <div class="group-header">
              <h2 id="modeLabel">Mode</h2>
            </div>
            <div class="segmented" role="radiogroup" aria-label="Conversion mode">
              <label>
                <input type="radio" name="mode" value="trace" checked>
                <span>Trace</span>
              </label>
              <label>
                <input type="radio" name="mode" value="runs">
                <span>Exact</span>
              </label>
            </div>
          </section>

          <section class="control-group" aria-labelledby="colorLabel">
            <div class="group-header">
              <h2 id="colorLabel">Color</h2>
              <output id="paletteValue">8</output>
            </div>
            <input id="paletteSize" type="range" min="2" max="256" step="1" value="8">
          </section>

          <section class="control-group" aria-labelledby="alphaLabel">
            <div class="group-header">
              <h2 id="alphaLabel">Alpha cutoff</h2>
              <output id="alphaValue">125</output>
            </div>
            <input id="alphaThreshold" type="range" min="0" max="254" step="1" value="125">
          </section>

          <section class="control-group" aria-labelledby="resolutionLabel">
            <div class="group-header">
              <h2 id="resolutionLabel">Resolution</h2>
              <output id="resolutionValue">4096</output>
            </div>
            <input id="maxDimension" type="range" min="64" max="4096" step="32" value="4096">
          </section>

          <section class="control-group" aria-labelledby="precisionLabel">
            <div class="group-header">
              <h2 id="precisionLabel">Precision</h2>
              <output id="precisionValue">1x</output>
            </div>
            <select id="precision">
              <option value="1" selected>1x pixels</option>
              <option value="2">2x scale / 4x pixels</option>
              <option value="4">4x scale / 16x pixels</option>
              <option value="5">5x scale / 25x pixels</option>
              <option value="8">8x scale / 64x pixels</option>
              <option value="10">10x scale / 100x pixels</option>
            </select>
          </section>

          <section class="control-group" aria-labelledby="simplifyLabel">
            <div class="group-header">
              <h2 id="simplifyLabel">Simplify</h2>
              <output id="simplifyValue">3.0</output>
            </div>
            <input id="simplify" type="range" min="0" max="3" step="0.1" value="3">
          </section>

          <section class="control-group" aria-labelledby="matteLabel">
            <div class="group-header">
              <h2 id="matteLabel">Matte</h2>
            </div>
            <select id="matte">
              <option value="transparent" selected>Transparent</option>
              <option value="white">White</option>
              <option value="black">Black</option>
            </select>
          </section>

          <section class="stats" aria-label="Output details">
            <div>
              <span>Source</span>
              <strong id="sourceStat">-</strong>
            </div>
            <div>
              <span>Trace</span>
              <strong id="traceStat">-</strong>
            </div>
            <div>
              <span>SVG</span>
              <strong id="sizeStat">-</strong>
            </div>
          </section>

          <section class="palette" aria-label="Detected colors">
            <div class="group-header">
              <h2>Palette</h2>
              <output id="colorCount">0</output>
            </div>
            <div class="swatches" id="swatches"></div>
          </section>
        </aside>

        <section class="preview-grid" aria-label="Image previews">
          <article class="preview-pane">
            <div class="preview-head">
              <h2>Original</h2>
              <span id="originalBadge">Waiting</span>
            </div>
            <div class="preview-stage checker">
              <canvas id="originalCanvas" aria-label="Original PNG preview"></canvas>
            </div>
          </article>

          <article class="preview-pane output-pane">
            <div class="preview-head">
              <h2>SVG output</h2>
              <span id="outputBadge">Idle</span>
            </div>
            <div class="preview-stage checker" id="svgPreview" aria-label="SVG preview"></div>
          </article>
        </section>
      </main>

      <footer class="statusbar">
        <span id="statusText" aria-live="polite">Load a PNG to begin.</span>
        <button class="text-button" id="copyButton" type="button" disabled>Copy SVG</button>
      </footer>
    </div>

    <script src="app.js"></script>
  </body>
</html>
